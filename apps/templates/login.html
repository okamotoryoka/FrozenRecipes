<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ログイン</title>

<style>

body{
    background:linear-gradient(to bottom,#eef8ff,#ffffff);
    font-family:Arial, sans-serif;
}


/* 全体 */
.login-container{
    width:400px;
    margin:80px auto;
}


/* タイトル */
.login-title{
    text-align:center;
    color:#3f8fd2;
    font-size:32px;
    margin-bottom:30px;
}


/* ログインカード */
.login-card{
    background:white;
    border:3px solid #9fd3f7;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 25px rgba(70,150,220,.18);
}


/* 入力欄 */
.form-group{
    margin-bottom:20px;
}


.form-group label{
    display:block;
    color:#4682b4;
    font-weight:bold;
    margin-bottom:8px;
}


.form-group input{
    width:100%;
    padding:12px;
    border:2px solid #d6ebfa;
    border-radius:12px;
    box-sizing:border-box;
    font-size:15px;
}


.form-group input:focus{
    outline:none;
    border-color:#7dc7ff;
}


/* ログインボタン */
.login-btn{
    width:100%;
    background:#63b3ed;
    color:white;
    border:none;
    border-radius:30px;
    padding:14px;
    font-size:17px;
    cursor:pointer;
}


.login-btn:hover{
    background:#4aa3e0;
}


/* 補助テキスト */
p{
    color:#555;
}

/* 新規登録ボタン */
.register-btn{
    display:block;
    width:100%;
    margin-top:15px;
    padding:14px;
    text-align:center;
    background:white;
    color:#63b3ed;
    border:2px solid #63b3ed;
    border-radius:30px;
    font-size:17px;
    text-decoration:none;
    box-sizing:border-box;
    transition:0.3s;
}

.register-btn:hover{
    background:#63b3ed;
    color:white;
}

/* パスワード表示切替 */
.password-box{
    position: relative;
}

.password-box input{
    width:100%;
    padding-right:45px;
    box-sizing:border-box;
}

.toggle-btn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:none;
    cursor:pointer;
    color:#666;
    font-size:18px;
}

.toggle-btn:hover{
    color:#3f8fd2;
}

</style>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>


<body>


<div class="login-container">


<h1 class="login-title">
🔐 ログイン
</h1>


<div class="login-card">


<form method="POST">

    {{ form.hidden_tag() }}

    <div class="form-group">
        {{ form.username.label }}
        {{ form.username() }}
    </div>

    <div class="form-group">

    {{ form.password.label }}

    <div class="password-box">
        {{ form.password(id="password") }}

        <button type="button" id="togglePassword" class="toggle-btn">
            <i class="fa-solid fa-eye"></i>
        </button>
    </div>

</div>

    {{ form.submit(class="login-btn") }}

    <a href="{{ url_for('auth.register') }}" class="register-btn">
        📝 新規登録
    </a>

</form>


</div>


</div>

...

</div>

<script>
const password = document.getElementById("password");
const toggle = document.getElementById("togglePassword");
const icon = toggle.querySelector("i");

toggle.addEventListener("click", function () {

    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }

});
</script>

</body>
</html>

</body>
</html>

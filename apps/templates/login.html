<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ログイン</title>

<style>

body{
    background:linear-gradient(to bottom,#eef8ff,#ffffff);
    font-family:Arial, sans-serif;
}


/* 全体 */
.login-container{
    width:400px;
    margin:80px auto;
}


/* タイトル */
.login-title{
    text-align:center;
    color:#3f8fd2;
    font-size:32px;
    margin-bottom:30px;
}


/* ログインカード */
.login-card{
    background:white;
    border:3px solid #9fd3f7;
    border-radius:25px;
    padding:30px;
    box-shadow:0 10px 25px rgba(70,150,220,.18);
}


/* 入力欄 */
.form-group{
    margin-bottom:20px;
}


.form-group label{
    display:block;
    color:#4682b4;
    font-weight:bold;
    margin-bottom:8px;
}


.form-group input{
    width:100%;
    padding:12px;
    border:2px solid #d6ebfa;
    border-radius:12px;
    box-sizing:border-box;
    font-size:15px;
}


.form-group input:focus{
    outline:none;
    border-color:#7dc7ff;
}


/* ログインボタン */
.login-btn{
    width:100%;
    background:#63b3ed;
    color:white;
    border:none;
    border-radius:30px;
    padding:14px;
    font-size:17px;
    cursor:pointer;
}


.login-btn:hover{
    background:#4aa3e0;
}


/* 補助テキスト */
p{
    color:#555;
}


</style>

</head>


<body>


<div class="login-container">


<h1 class="login-title">
🔐 ログイン
</h1>


<div class="login-card">


<form method="POST">

{{ form.hidden_tag() }}


<div class="form-group">

{{ form.username.label }}

{{ form.username() }}

</div>



<div class="form-group">

{{ form.password.label }}

{{ form.password() }}

</div>



{{ form.submit(class="login-btn") }}


</form>


</div>


</div>


</body>
</html>

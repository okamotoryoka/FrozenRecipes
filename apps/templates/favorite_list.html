<style>
.recipe-title{
    font-size: 1.5rem;
    font-weight: bold;
    color: #2c3e50;
    background-color: #f8f9fa;
    padding: 12px 16px;
    border-left: 6px solid #ff9800;
    border-radius: 8px;
    margin-bottom: 15px;
}

.favorite-container{
    max-width: 900px;
    margin: auto;
}

.recipe-card{
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.recipe-card h3{
    margin-top: 0;
    color: #333;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 10px;
}

.recipe-text{
    white-space: pre-wrap;
    line-height: 1.8;
    color: #555;
    margin: 15px 0;
}

.delete-btn{
    background-color: #ff6b6b;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
}

.delete-btn:hover{
    opacity: 0.9;
}

.home-btn{
    background-color: #4caf50;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    cursor: pointer;
}

</style>

{% extends "base.html" %}

{% block title %}お気に入り{% endblock %}

{% block content %}

<h1>お気に入り一覧</h1>

{% if favorites %}

    {% for f in favorites %}

        <div class="recipe-card">

            <h3 class="recipe-title">{{ f.title }}</h3>

            <div class="recipe-text">
                {{ f.text }}
            </div>

            <br>

            <form method="POST"
                  action="/favorite/delete/{{ f.id }}"
                  onsubmit="return confirm('お気に入りから削除しますか？');">

                <button type="submit">
                    🗑️ お気に入り解除
                </button>

            </form>

        </div>

    {% endfor %}

{% else %}

    <p>お気に入りはまだありません</p>

{% endif %}

<hr>

<a href="/home">
    <button>🏠 ホームへ戻る</button>
</a>

{% endblock %}

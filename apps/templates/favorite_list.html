<style>

/* 背景 */
body{
    background:linear-gradient(to bottom,#fff0f6,#ffffff);
}


/* ページタイトル */
.page-title{
    text-align:center;
    color:#e75480;
    font-size:32px;
    margin-bottom:30px;
}


/* お気に入り全体 */
.favorite-container{
    max-width:700px;
    margin:auto;
}


/* レシピカード */
.recipe-card{
    background:linear-gradient(to bottom,#ffffff,#fff5fa);
    border:3px solid #f7b6cc;
    border-radius:25px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(231,84,128,.15);
    transition:.3s;
}

.recipe-card:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 30px rgba(231,84,128,.25);
}


/* レシピタイトル */
.recipe-title{
    font-size:1.5rem;
    font-weight:bold;
    color:#d94f7d;
    background:#fff0f6;
    padding:12px 16px;
    border-left:6px solid #ff8fab;
    border-radius:10px;
    margin-bottom:15px;
}


/* レシピ本文 */
.recipe-text{
    white-space:pre-wrap;
    line-height:1.8;
    color:#666;
    margin:15px 0;
}


/* 削除ボタン */
.delete-btn{
    background:#ff8fab;
    color:white;
    border:none;
    border-radius:25px;
    padding:10px 20px;
    cursor:pointer;
    font-size:15px;
}

.delete-btn:hover{
    background:#ff6f91;
}


/* ホームボタン */
.home-btn{
    background:#f48fb1;
    color:white;
    border:none;
    border-radius:30px;
    padding:12px 28px;
    cursor:pointer;
    font-size:16px;
}

.home-btn:hover{
    background:#ec407a;
}


/* ボタン配置 */
.button-area{
    text-align:center;
    margin-top:35px;
}


</style>

{% extends "base.html" %}

{% block title %}お気に入り{% endblock %}

{% block content %}

<h1 class="page-title">💗 お気に入り一覧</h1>

{% if favorites %}

    {% for f in favorites %}

        <div class="recipe-card">

            <h3 class="recipe-title">{{ f.title }}</h3>

            <div class="recipe-text">
                {{ f.text }}
            </div>

            <br>

            <form method="POST"
                  action="/favorite/delete/{{ f.id }}"
                  onsubmit="return confirm('お気に入りから削除しますか？');">

                <button class="delete-btn" type="submit">
                    💔 お気に入り解除
                </button>

            </form>

        </div>

    {% endfor %}

{% else %}

    <p>お気に入りはまだありません</p>

{% endif %}

<hr>

<a href="/home">
    <button class="home-btn">
    🏠 ホームへ戻る
</button>
</a>

{% endblock %}

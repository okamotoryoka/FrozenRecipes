<h1>食材追加</h1>

<form method="POST">
  <input name="name" placeholder="食材名"><br>

  <input name="quantity" type="number" placeholder="数量"><br>

  <input name="unit" placeholder="g / 個 / ml"><br>

  <label>賞味期限</label>
  <input name="best_before_date" type="date"><br>

  <label>消費期限</label>
  <input name="expiry_date" type="date"><br>

  <button type="submit">追加</button>
</form>
